<style>
    /* =========================================================
       SIDEBAR GLOBAL STYLES (COPIA EXACTA MAIN APP)
    ========================================================= */
    .sidebar {
      width: 280px;
      background: #0f172a; /* Main app uses this color implicitly */
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 0; 
      color: white;
      transition: width 0.3s ease;
      overflow-x: hidden;
      flex-shrink: 0;
      z-index: 1000;
      position: relative;
    }

    /* Logo - Copiado y ajustado para colapso */
    .logo {
        padding: 24px 0 24px 28px;
        display: flex;
        align-items: center;
        gap: 12px;
        min-height: 80px;
        white-space: nowrap;
        overflow: hidden;
    }
    .logo-img { width: 32px; height: 32px; flex-shrink: 0; }
    .logo-text { font-weight: 800; font-size: 20px; letter-spacing: 0.5px; color: #fff; opacity: 1; transition: opacity 0.2s; }

    /* Nav Items */
    .sidebar .nav { padding: 0 16px; width: 100%; gap: 6px; }
    
    .sidebar > .nav > .nav-item > .nav-link,
    .d-flex-menu {
      color: rgba(255,255,255,0.75);
      border-radius: 12px;
      padding: 12px 14px 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: background 0.2s ease, color 0.2s ease;
      font-weight: 500;
      text-decoration: none;
      white-space: nowrap;
      cursor: pointer;
      position: relative;
    }
    
    .sidebar > .nav > .nav-item > .nav-link:hover,
    .sidebar > .nav > .nav-item > .nav-link.active,
    .d-flex-menu:hover {
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
    }
    
    .sidebar .nav-link i, .d-flex-menu i { 
        width: 20px; 
        text-align: center; 
        flex-shrink: 0; 
        font-size: 1.1em; 
    }

    /* Active Indicator */
    .nav-item.active-indicator::before {
      content: "";
      position: absolute;
      left: -16px;
      top: 10px;
      bottom: 10px;
      width: 4px;
      background: #f5c544;
      border-radius: 0 4px 4px 0;
      display: none;
    }
    .nav-item.active-indicator .nav-link { color: #fff; background: rgba(255,255,255,0.1); }
    .nav-item.active-indicator.active-real::before { display: block; }

    /* Submenu Logic */
    .matriculas-menu, .movimientos-menu { width: 100%; }
    .d-flex-menu { justify-content: space-between; padding-right: 4px !important; }
    .d-flex-menu .menu-label-link { display: flex; align-items: center; gap: 12px; flex: 1; background: transparent !important; color: inherit !important; text-decoration: none; border: none; padding: 0; margin: 0; }
    
    .toggle-submenu {
        background: transparent !important;
        border: none !important;
        color: inherit !important;
        padding: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        opacity: 0.7;
        transition: transform 0.3s ease, color 0.2s;
        width: 32px;
        height: 32px;
        border-radius: 50%;
    }
    .toggle-submenu:hover { background: rgba(255,255,255,0.1) !important; opacity: 1; }
    
    /* Submenu List */
    .nav-submenu {
        list-style: none;
        padding-left: 0;
        margin-top: 2px;
        display: none;
        overflow: hidden;
        width: 100%;
    }
    .nav-submenu.show { display: block; animation: slideDown 0.2s ease-out; }
    .nav-submenu .nav-link { padding-left: 48px !important; font-size: 0.9em; color: rgba(255,255,255,0.6) !important; white-space: nowrap; }
    .nav-submenu .nav-link:hover { color: #fff !important; }
    .d-flex-menu.expanded .toggle-submenu { transform: rotate(180deg); }

    @keyframes slideDown { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
    .mt-auto { margin-top: auto !important; }
    .bottom { margin-bottom: 20px; }

    /* =========================================================
       COLLAPSED STATE (body.sidebar-collapsed)
    ========================================================= */
    body.sidebar-collapsed .sidebar { width: 80px; }
    
    body.sidebar-collapsed .sidebar .logo-text,
    body.sidebar-collapsed .sidebar .nav-link span,
    body.sidebar-collapsed .sidebar .d-flex-menu span,
    body.sidebar-collapsed .sidebar .d-flex-menu .toggle-submenu,
    body.sidebar-collapsed .sidebar .menu-label-link span,
    body.sidebar-collapsed .sidebar .nav-submenu {
        display: none !important;
    }

    body.sidebar-collapsed .sidebar .logo { padding-left: 0; justify-content: center; }
    body.sidebar-collapsed .sidebar .nav { padding: 0 10px; }
    body.sidebar-collapsed .sidebar .nav-item { display: flex; justify-content: center; }
    
    body.sidebar-collapsed .sidebar .nav-link,
    body.sidebar-collapsed .sidebar .d-flex-menu {
        justify-content: center;
        padding: 12px 0;
        width: 100%;
    }
    
    body.sidebar-collapsed .sidebar .nav-link i, 
    body.sidebar-collapsed .sidebar .d-flex-menu i { 
        margin: 0; 
        font-size: 1.3em; 
    }
    
    body.sidebar-collapsed .sidebar .logo-img { display: none; }
    body.sidebar-collapsed .sidebar .logo::after {
        content: "G";
        font-weight: 800;
        font-size: 28px;
        color: white;
    }
</style>

<script>
    // Función global para ser llamada desde home.html
    window.toggleSidebar = function() {
        document.body.classList.toggle('sidebar-collapsed');
        const isCollapsed = document.body.classList.contains('sidebar-collapsed');
        localStorage.setItem('sidebar_collapsed', isCollapsed);
        
        // Limpieza visual si colapsamos
        if(isCollapsed) {
            document.querySelectorAll('.nav-submenu.show').forEach(el => el.classList.remove('show'));
            document.querySelectorAll('.d-flex-menu.expanded').forEach(el => el.classList.remove('expanded'));
        }
    };
    
    function toggleSubmenu(triggerElement, menuId) {
        // Al interactuar con el menú en modo colapsado, expandimos el sidebar primero
        if (document.body.classList.contains('sidebar-collapsed')) {
            window.toggleSidebar(); 
            setTimeout(() => {
                const el = document.getElementById(menuId);
                const parent = triggerElement; 
                if(el) el.classList.add('show');
                if(parent) parent.classList.add('expanded');
            }, 300);
            return;
        }
        
        const el = document.getElementById(menuId);
        if(el) {
            el.classList.toggle('show');
            triggerElement.classList.toggle('expanded');
            
            // Cerrar otros
            // document.querySelectorAll('.nav-submenu.show').forEach(n => { if(n !== el) n.classList.remove('show') });
        }
    }
    
    // Restaurar estado al cargar
    document.addEventListener("DOMContentLoaded", () => {
        const isCollapsed = localStorage.getItem('sidebar_collapsed') === 'true';
        if(isCollapsed) {
            document.body.classList.add('sidebar-collapsed');
        }
    });
</script>
